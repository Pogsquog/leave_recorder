{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="card-dark rounded-xl backdrop-blur-xl p-6 neon-border-fuchsia">
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-cyan-400 mb-6 tracking-wide">{% trans "Create Organisation" %}</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="group">
                <label for="id_name" class="block text-sm font-medium text-fuchsia-300/80 mb-2">{% trans "Name" %}</label>
                <input type="text" name="name" id="id_name" required
                    class="w-full px-4 py-3 bg-gray-800/50 border border-fuchsia-500/30 rounded-lg text-fuchsia-100 placeholder-fuchsia-700 focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400/50 focus:outline-none transition-all"
                    placeholder="{% trans 'Organisation name' %}">
            </div>
            <div class="group">
                <label for="id_slug" class="block text-sm font-medium text-fuchsia-300/80 mb-2">{% trans "Slug" %} ({% trans "optional" %})</label>
                <input type="text" name="slug" id="id_slug"
                    class="w-full px-4 py-3 bg-gray-800/50 border border-fuchsia-500/30 rounded-lg text-fuchsia-100 placeholder-fuchsia-700 focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400/50 focus:outline-none transition-all"
                    placeholder="{% trans 'Auto-generated if left blank' %}">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white px-4 py-3 rounded-lg font-medium hover:from-cyan-500 hover:to-blue-500 border border-cyan-400/50 neon-button-cyan transition-all tracking-wide uppercase text-sm">
                {% trans "Create" %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
